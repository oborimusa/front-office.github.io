<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=yes"
    />
    <title>4T Luxury Hotel - Login</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }
      body {
        background: linear-gradient(135deg, #0b2b3b 0%, #144d5e 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }
      .login-card {
        background: white;
        max-width: 400px;
        width: 100%;
        padding: 40px;
        border-radius: 30px;
        text-align: center;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
      }
      .login-card h1 {
        color: #b8860b;
        margin-bottom: 10px;
      }
      .login-card p {
        color: #666;
        margin-bottom: 30px;
      }
      .input-group {
        margin-bottom: 20px;
        text-align: left;
      }
      .input-group label {
        font-weight: 600;
        color: #4a3b28;
        display: block;
        margin-bottom: 8px;
      }
      .input-group input {
        width: 100%;
        padding: 14px 16px;
        border: 1px solid #e2d5c4;
        border-radius: 25px;
        font-size: 1rem;
      }
      .btn-login {
        background: #b8860b;
        color: white;
        border: none;
        width: 100%;
        padding: 14px;
        border-radius: 25px;
        font-size: 1rem;
        font-weight: bold;
        cursor: pointer;
      }
      .btn-login:hover {
        background: #9b6f0a;
      }
      .help-text {
        margin-top: 20px;
        font-size: 0.7rem;
        color: #888;
      }
    </style>
  </head>
  <body>
    <div class="login-card">
      <h1>🏨 4T Luxury Hotel</h1>
      <p>Front Desk Login</p>

      <!-- Remove the form action and method; use a simple div or a form with action="#" -->
      <form action="#" method="get">
        <div class="input-group">
          <label>Username</label>
          <input
            type="text"
            name="username"
            placeholder="Enter username"
            required
            autofocus
          />
        </div>

        <div class="input-group">
          <label>Password</label>
          <input
            type="password"
            name="password"
            placeholder="Enter password"
            required
          />
        </div>

        <button type="submit" class="btn-login">Login</button>
      </form>

      <div class="help-text">Contact administrator for login credentials</div>
    </div>
    <script>
      document.querySelector("form").addEventListener("submit", function (e) {
        e.preventDefault(); // stop form from reloading

        const username = document.querySelector('input[name="username"]').value;
        const password = document.querySelector('input[name="password"]').value;

        // Hardcoded credentials (for demo only – not secure for production)
        if (username === "admin" && password === "4T2025") {
          alert("Login successful! Redirecting to dashboard...");
          window.location.href = "/dashboard.html";
        } else {
          alert("Invalid username or password. Please try again.");
        }
      });
    </script>
  </body>
</html>
