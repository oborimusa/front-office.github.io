<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>4T Luxury Hotel - Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body {
            background: linear-gradient(135deg, #0b2b3b 0%, #144d5e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .dashboard-card {
            background: white;
            max-width: 650px;
            width: 100%;
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .dashboard-card h1 {
            color: #b8860b;
            margin-bottom: 10px;
            font-size: 2rem;
        }
        .dashboard-card p {
            color: #666;
            margin-bottom: 20px;
        }
        .features {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 30px 0;
        }
        .feature-item {
            background: #f8f4f0;
            padding: 20px;
            border-radius: 16px;
            border: 1px solid #e2d5c4;
            text-align: center;
        }
        .feature-item h3 {
            color: #0b2b3b;
            margin-bottom: 8px;
            font-size: 1rem;
        }
        .feature-item p {
            font-size: 0.8rem;
            color: #666;
            margin: 0;
        }
        .feature-item .number {
            font-size: 2rem;
            font-weight: 700;
            color: #b8860b;
        }
        .logout-btn {
            background: #b8860b;
            color: white;
            border: none;
            padding: 12px 40px;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }
        .logout-btn:hover {
            background: #9b6f0a;
        }
        .welcome-name {
            color: #b8860b;
            font-weight: 600;
        }
        @media (max-width: 500px) {
            .features {
                grid-template-columns: 1fr;
            }
            .dashboard-card {
                padding: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-card">
        <h1>🏨 4T Luxury Hotel</h1>
        <p>Welcome, <span class="welcome-name">Admin</span> 👋</p>
        <p style="font-size: 0.85rem;">Front Desk Dashboard</p>

        <div class="features">
            <div class="feature-item">
                <div class="number">12</div>
                <h3>📋 Today's Check-ins</h3>
                <p>Guests expected</p>
            </div>
            <div class="feature-item">
                <div class="number">8</div>
                <h3>🛏️ Available Rooms</h3>
                <p>22 occupied</p>
            </div>
            <div class="feature-item">
                <div class="number">3</div>
                <h3>💬 New Messages</h3>
                <p>Unread</p>
            </div>
            <div class="feature-item">
                <div class="number">73%</div>
                <h3>📊 Occupancy Rate</h3>
                <p>Last 7 days</p>
            </div>
        </div>

        <button class="logout-btn" onclick="window.location.href='index.html'">🚪 Logout</button>
    </div>
</body>
</html>
